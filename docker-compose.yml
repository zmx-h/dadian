services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: dadian
      POSTGRES_USER: dadian
      POSTGRES_PASSWORD: dadian_dev
    ports:
      - "5432:5432"
    volumes:
      - "./dev-data/pg:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dadian"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
